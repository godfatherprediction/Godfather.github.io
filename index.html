<!DOCTYPE html>
<html>
<head>
  <title>GODFATHER</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 350px;
    }

    .title {
      font-size: 30px;
      color: white;
      text-shadow: 0 0 10px #00c3ff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .count {
      color: red;
      text-shadow: 0 0 10px red;
    }

    .box {
      border: 1px solid #555;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .box:hover {
      border-color: #00c3ff;
      transform: scale(1.03);
    }

    .btn {
      display: block;
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      background: linear-gradient(45deg, red, blue);
      color: white;
      text-decoration: none;
      font-weight: bold;
      animation: btn 2s infinite;
    }

    @keyframes btn {
      0% { transform: scale(1); }
      50% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    .users {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }

  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

  <h1 class="title">👑 GODFATHER 👑</h1>

  <p>Since 2017</p>
  <p>💯 Accuracy ke sath 💯</p>

  <h2>Seconds Left... <span class="count" id="count">60</span></h2>

  <div class="box">⚡ BACK-TO-BACK MATCH PASS</div>
  <div class="box">IPL ALL MATCH PASS</div>
  <div class="box">CPL ALL MATCH PASS</div>

  <a href="https://t.me/+ZVFkgzeA-2llODJl" class="btn" onclick="playSound()">
    JOIN THE CHANNEL NOW 🚀
  </a>

  <div class="users">🔥 <span id="users">128</span> users watching now</div>

</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
  // countdown
  let time = 60;
  setInterval(() => {
    time = time > 0 ? time - 1 : 60;
    document.getElementById("count").innerText = time;
  }, 1000);

  // fake users
  let users = 120;
  setInterval(() => {
    users += Math.floor(Math.random()*5 - 2);
    if(users < 100) users = 100;
    document.getElementById("users").innerText = users;
  }, 2000);

  // sound
  function playSound(){
    document.getElementById("clickSound").play();
  }

  // particles
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  for(let i=0;i<60;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*2,
      d: Math.random()*1
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();

      p.y += p.d;
      if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
  }

  draw();
</script>

</body>
</html>
