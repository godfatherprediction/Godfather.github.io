<!DOCTYPE html>
<html>
<head>
  <title>GODFATHER</title>

  <style>
    *{box-sizing:border-box;}

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
    }

    .title {
  font-size: 80px;
  font-weight: bold;
  text-shadow: 0 0 30px #00c3ff;
  animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.06);}
      100% {transform: scale(1);}
    }

    .count {
      color: red;
      font-size: 40px;
      text-shadow: 0 0 20px red;
    }

    .box {
      border: 8px solid #555;
      padding: 25px;
      margin: 18px 0;
      border-radius: 12px;
      font-size: 38px;
    }

    .btn {
      display: block;
      margin-top: 25px;
      padding: 25px;
      font-size: 42px;
      border-radius: 14px;
      background: linear-gradient(45deg, red, blue);
      color: white;
      text-decoration: none;
      animation: zoom 1.5s infinite;
    }

    @keyframes zoom {
      0% {transform: scale(1);}
      50% {transform: scale(1.08);}
      100% {transform: scale(1);}
    }

    .users {
      margin-top: 12px;
      font-size: 30px;
      color: #ccc;
    }

    .joined {
      font-size: 32px;
      color: #39ff14;
      text-shadow: 0 0 8px #39ff14;
      margin-top: 5px;
    }

    /* 🚀 rocket */
    #rocket {
      position: fixed;
      font-size: 25px;
      animation: fly 8s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes fly {
      0% { top: 80%; left: 10%; }
      25% { top: 10%; left: 80%; }
      50% { top: 5%; left: 50%; }
      75% { top: 40%; left: 5%; }
      100% { top: 80%; left: 10%; }
    }

  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

  <h1 class="title">👑 GODFATHER 👑</h1>

  <p style="font-size:40px;">Since 2017</p>
  <p style="font-size:40px;">💯 Accuracy ke sath 💯</p>

  <h1>Seconds Left... <span class="count" id="count">60</span></h1>

  <div class="box">⚡ BACK-TO-BACK MATCH PASS</div>
  <div class="box">IPL ALL MATCH PASS</div>
  <div class="box">CPL ALL MATCH PASS</div>

  <a href="https://t.me/+ZVFkgzeA-2llODJl" class="btn" onclick="go(event)">
    JOIN THE CHANNEL NOW 🚀
  </a>

  <div class="users">🔥 <span id="users">120</span> users watching</div>
  <div class="joined">✔ <span id="joined">384</span> joined</div>

</div>

<div id="rocket">🚀</div>

<audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
  // countdown
  let t = 48;
  setInterval(()=>{
    t = t>0 ? t-1 : 60;
    document.getElementById("count").innerText = t;
  },1000);

  // watching users
  let u = 120;
  setInterval(()=>{
    u += Math.floor(Math.random()*5 - 2);
    if(u < 100) u = 100;
    document.getElementById("users").innerText = u;
  },2000);

  // joined random realistic
  let j = 384;
  function updateJoined(){
    let delay = Math.random()*4000 + 1000;
    let inc = Math.floor(Math.random()*3)+1;
    j += inc;
    document.getElementById("joined").innerText = j;
    setTimeout(updateJoined, delay);
  }
  updateJoined();

  // sound
  function go(e){
    e.preventDefault();
    let s = document.getElementById("sound");
    s.play().catch(()=>{});
    setTimeout(()=>{
      window.location.href = "https://t.me/+ZVFkgzeA-2llODJl";
    },300);
  }

  // ⭐ PARTICLES
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  for(let i=0;i<80;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*2,
      d: Math.random()*1
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();

      p.y += p.d;
      if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
  }

  draw();
</script>

</body>
</html>
