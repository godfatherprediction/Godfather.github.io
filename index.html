<!DOCTYPE html>
<html>
<head>
  <title>GODFATHER</title>

  <style>
    *{box-sizing:border-box;}

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .title {
      font-size: 40px;
      text-shadow: 0 0 12px #00c3ff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.05);}
      100% {transform: scale(1);}
    }

    .count {
      color: red;
      font-size: 24px;
      text-shadow: 0 0 10px red;
    }

    .box {
      border: 1px solid #555;
      padding: 15px;
      margin: 12px 0;
      border-radius: 8px;
      font-size: 18px;
    }

    .btn {
      display: block;
      margin-top: 20px;
      padding: 16px;
      font-size: 20px;
      border-radius: 10px;
      background: linear-gradient(45deg, red, blue);
      color: white;
      text-decoration: none;
      animation: zoom 1.5s infinite;
    }

    @keyframes zoom {
      0% {transform: scale(1);}
      50% {transform: scale(1.08);}
      100% {transform: scale(1);}
    }

    .users {
      margin-top: 12px;
      font-size: 16px;
      color: #ccc;
    }

    .joined {
      font-size: 16px;
      color: #39ff14;
      text-shadow: 0 0 8px #39ff14;
      margin-top: 5px;
    }

    /* 🚀 rocket */
    #rocket {
      position: fixed;
      font-size: 26px;
      animation: fly 8s linear infinite;
      pointer-events: none;
    }

    @keyframes fly {
      0% { top: 80%; left: 10%; }
      25% { top: 10%; left: 80%; }
      50% { top: 5%; left: 50%; }
      75% { top: 40%; left: 5%; }
      100% { top: 80%; left: 10%; }
    }

  </style>
</head>

<body>

<div class="container">

  <h1 class="title">👑 GODFATHER 👑</h1>

  <p>Since 2017</p>
  <p>💯 Accuracy ke sath 💯</p>

  <h2>Seconds Left... <span class="count" id="count">60</span></h2>

  <div class="box">⚡ BACK-TO-BACK MATCH PASS</div>
  <div class="box">IPL ALL MATCH PASS</div>
  <div class="box">CPL ALL MATCH PASS</div>

  <a href="https://t.me/+ZVFkgzeA-2llODJl" class="btn" onclick="go(event)">
    JOIN THE CHANNEL NOW 🚀
  </a>

  <div class="users">🔥 <span id="users">120</span> users watching</div>
  <div class="joined">✔ <span id="joined">384</span> joined</div>

</div>

<div id="rocket">🚀</div>

<audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>

  // countdown
  let t = 60;
  setInterval(()=>{
    t = t>0 ? t-1 : 60;
    document.getElementById("count").innerText = t;
  },1000);

  // watching users
  let u = 120;
  setInterval(()=>{
    u += Math.floor(Math.random()*5 - 2);
    if(u < 100) u = 100;
    document.getElementById("users").innerText = u;
  },2000);

  // realistic joined
  let j = 384;
  function updateJoined(){
    let delay = Math.random()*4000 + 1000; // 1–5 sec
    let inc = Math.floor(Math.random()*3)+1; // 1–3 users

    j += inc;
    document.getElementById("joined").innerText = j;

    setTimeout(updateJoined, delay);
  }
  updateJoined();

  // sound + redirect
  function go(e){
    e.preventDefault();

    let s = document.getElementById("sound");
    s.currentTime = 0;
    s.play().catch(()=>{});

    setTimeout(()=>{
      window.location.href = "https://t.me/+ZVFkgzeA-2llODJl";
    },300);
  }

</script>

</body>
</html>
