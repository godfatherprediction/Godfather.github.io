    h1 {

    .box {

      padding: 12px;
      margin: 15px auto;
      width: 80%;
      max-width: 300px;
    }

    .btn {
      background: blue;

      padding: 15px;

      font-size: 18px;
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      animation: zoom 1.2s infinite;
    }

    @keyframes zoom {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .small {
      margin-top: 15px;
      color: #ccc;

  <div class="box">CPL ALL MATCH PASS ✔</div>
