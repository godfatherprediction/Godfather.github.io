<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Circle</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#050505;color:white;overflow-x:hidden;}

/* PARTICLE BACKGROUND */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.nav-links a{
  margin:0 12px;
  cursor:pointer;
}

/* LOGO */
.logo{
  font-weight:800;
  font-size:22px;
  color:#ff0000;
  animation:logoAnim 3s infinite alternate;
}

@keyframes logoAnim{
  from{text-shadow:0 0 10px red;}
  to{text-shadow:0 0 30px red;}
}

/* HERO */
.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
}

.left{
  flex:1;
  min-width:300px;
}

.right{
  flex:1;
  min-width:300px;
  text-align:center;
}

/* TEXT */
.hero h1{
  font-size:42px;
  color:#ff0000;
}

.hero p{
  margin:10px 0;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:12px 25px;
  margin-top:15px;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(135deg,#ff0000,#ff9900);
  box-shadow:0 0 20px red;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* GLASS BOX */
.glass{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(255,0,0,0.3);
}

/* SERVICES */
.services{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  padding:25px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

/* COLORS */
.meta{background:#1877f2;box-shadow:0 0 20px #1877f2;}
.telegram{background:#229ED9;box-shadow:0 0 20px #229ED9;}
.trading{background:linear-gradient(135deg,#8b0000,#00ff00);box-shadow:0 0 20px red;}
.landing{background:#ff9900;box-shadow:0 0 20px orange;}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  box-shadow:0 0 20px #25D366;
  cursor:pointer;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Ad Circle</div>

  <div class="nav-links">
    <a onclick="go('home')">Home</a>
    <a onclick="go('services')">Services</a>
    <a onclick="go('contact')">Contact</a>
  </div>
</div>

<!-- HERO -->
<div id="home" class="hero">

  <div class="left">
    <h1>Scale Your Business 🚀</h1>
    <p>Meta Ads | Landing Pages | Lead Generation</p>
    <div class="btn" onclick="openWA()">Start Campaign</div>
  </div>

  <div class="right">
    <div class="glass">
      <h2>₹1599</h2>
      <p>Complete Ad Setup</p>
      <p>₹1 - ₹2 CPC</p>
    </div>
  </div>

</div>

<!-- SERVICES -->
<div id="services" class="services">

  <h2>Our Services</h2>

  <div class="cards">

    <div class="card meta">Meta Ads</div>
    <div class="card telegram">Telegram Members</div>
    <div class="card trading">Trading Ads</div>
    <div class="card landing">Landing Pages</div>

  </div>

</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h2>Contact Us</h2>
  <div class="btn" onclick="openWA()">WhatsApp Now</div>
</div>

<!-- WHATSAPP -->
<div class="whatsapp" onclick="openWA()">💬</div>

<script>

/* NAV SCROLL */
function go(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* WHATSAPP */
function openWA(){
  window.open("https://wa.me/919876543210","_blank");
}

/* PARTICLES */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()*1,
    dy:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x>canvas.width) p.x=0;
    if(p.y>canvas.height) p.y=0;
  });

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
